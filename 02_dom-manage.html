<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM CRUD</title>
    <style>
      .switch {
        background-color: greenyellow;
      }
      .border {
        border: 1px solid salmon;
      }
    </style>
  </head>
  <body>
    <div>
      <button onclick="addBox()">생성</button>
      <h1>추가된 요소들</h1>
      <div id="container"></div>
    </div>
    <script>
      const container = document.querySelector("#container");
      function addBox() {
        // console.log("박스를 추가합니다");
        // alert("박스를 추가합니다");
        // confirm("박스를 추가합니다");
        const content = prompt("추가할 내용을 넣어주세요");
        console.log(content);
        const box = document.createElement("p"); // 태그 이름 지정
        // box.innerHTML = "박스 안에 텍스트";
        // box.innerHTML = `<strong>태그를 넣으면</strong>`;
        // box.innerHTML = `<button onclick="alert('해킹 당했습니다!')">부자가 되는 법, 꼭 확인하세요!</button>`;
        // box.innerText = content;
        // console.log(box.innerText);
        // 실제적으로 마지막으로 렌더링(표현)된 텍스트를 가져옴
        // 렌더링을 고려하기 때문에 상대적으로 느림
        box.textContent = content; // 렌더링 상관 안하고 바로 집어넣거나 불러들이는 기능
        box.title = "타이틀"; // 속성(Attribute)
        box["id"] = "myid";
        // 변수명으로 쓸 수 있는 이름을 가지고 있으면 프로퍼티처럼 호출
        // 괄호로 넣어서 처리
        // box.className = "switch";
        // box.className = "border";
        // box.className = "switch border";
        box.classList.add("switch");
        box.classList.add("border");
        // add : 추가
        // remove : 제거
        // contains : 확인(has)
        // toggle : 껐다켰다
        box.style.fontSize = "24px"; // font-size
        // css 프로퍼티는 kebab-case인데, dom에서는 style의 js 프로퍼티 처럼 인식. -> js 프로퍼티는 camelCase
        box.addEventListener("click", () => box.classList.toggle("switch"));
        console.log(box.classList);
        container.append(box);
        // HTML 속성(attribute) -> js 프로퍼티처럼 (.이나 [])
        // class -> js 예약어 -> className, classList**
        // CSS 속성(property) -> style을 객체처럼 쓴다 (kebab-case => camelCase)
        const deleteButton = document.createElement("button");
        deleteButton.textContent = "삭제";
        box.append(deleteButton);
        deleteButton.addEventListener("click", () => {
          box.remove(); // 스스로를 삭제
        });
      }
    </script>
  </body>
</html>
