<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>event type</title>
  </head>
  <body>
    <!-- <script>
      const btn = document.querySelector("#btn"); // null
      console.log(btn);
    </script> -->
    <script>
      // const asy = async () => {}
      // await asy();
      // SyntaxError: await is only valid in async functions and the top level bodies of modules
      // 모든 요소 로딩(렌더링)이 중요하다면 load
      document.addEventListener("DOMContentLoaded", () => {
        // 비동기를 처리하기 위한 감싸는 main, entry 진입점.
        console.log("DOM 로딩됨");
        const btn = document.querySelector("#btn");
        console.log(btn);
        // 비동기 처리
      });
    </script>
    <button id="btn">click</button>
    <script>
      const btn = document.querySelector("#btn");
      console.log(btn);
    </script>
    <!-- input -->
    <input type="text" id="i1" />
    <p id="p1"></p>
    <script>
      const i1 = document.querySelector("#i1");
      const p1 = document.querySelector("#p1");
      i1.addEventListener("input", (event) => {
        // console.log(event);
        // console.log("입력중");
        // console.log(event.target); // input 받는 태그
        // console.log(event.target.value);
        p1.textContent = event.target.value;
      });
      i1.addEventListener("change", (event) => {
        console.log("변화가 있음");
        console.log(event.target.value); // 입력을 마치고 포커스가 풀려야함
      });
      i1.addEventListener("focus", (event) => {
        event.target.style.backgroundColor = "greenyellow";
        console.log("포커스 취득");
      });
      i1.addEventListener("blur", (event) => {
        console.log("포커스 상실");
        event.target.style.backgroundColor = "transparent";
      });
    </script>
  </body>
</html>
